<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#7a1c2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Nüsse">
<title>Nüsse — Punto de Venta</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --wine: #7a1c2e;
    --wine-light: #f5eaec;
    --wine-mid: #c9707f;
    --cream: #faf7f5;
    --cream-dark: #f0ebe6;
    --text: #2a1a1e;
    --text-muted: #8a6e74;
    --border: #e0d0d4;
    --white: #ffffff;
    --success: #2d7a4f;
    --danger: #c0392b;
  }

  body {
    font-family: 'Jost', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
  }

  /* HEADER */
  .header {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }



  /* TABS */
  .tabs {
    display: flex;
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    gap: 0;
  }

  .tab-btn {
    padding: 12px 18px;
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }

  .tab-btn.active {
    color: var(--wine);
    border-bottom-color: var(--wine);
    font-weight: 500;
  }

  /* LAYOUT */
  .content { padding: 0; }

  .section { display: none; }
  .section.visible { display: block; }

  /* VENTA LAYOUT */
  .venta-layout {
    display: grid;
    grid-template-columns: 1fr 360px;
    min-height: calc(100vh - 110px);
  }

  @media (max-width: 700px) {
    .venta-layout { grid-template-columns: 1fr; }
    .cart-panel { border-left: none; border-top: 1px solid var(--border); }
    .prod-panel { min-height: auto; }
  }

  /* PRODUCTS PANEL */
  .prod-panel {
    padding: 20px;
    background: var(--cream);
    overflow-y: auto;
  }

  .panel-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 16px;
  }

  .size-filter {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }

  .size-pill {
    padding: 5px 14px;
    border-radius: 99px;
    border: 1px solid var(--border);
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 1px;
    background: var(--white);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .size-pill.active {
    background: var(--wine);
    color: var(--white);
    border-color: var(--wine);
  }

  .prod-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 10px;
  }

  .prod-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 12px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }

  .prod-card:hover { border-color: var(--wine-mid); box-shadow: 0 2px 12px rgba(122,28,46,0.08); }
  .prod-card:active { transform: scale(0.98); }
  .prod-card.disabled { opacity: 0.4; pointer-events: none; }

  .prod-sabor {
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 2px;
  }

  .prod-size {
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .prod-price {
    font-size: 14px;
    font-weight: 500;
    color: var(--wine);
  }

  .prod-stock {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* CART PANEL */
  .cart-panel {
    background: var(--white);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: calc(100vh - 110px);
    position: sticky;
    top: 110px;
  }

  @media (max-width: 700px) {
    .cart-panel { height: auto; position: static; }
  }

  .cart-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .cart-items {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }

  .cart-item {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 8px;
    align-items: center;
    padding: 10px 20px;
    border-bottom: 1px solid var(--cream-dark);
  }

  .ci-info { }
  .ci-name { font-family: 'Cormorant Garamond', serif; font-size: 16px; font-weight: 600; }
  .ci-size { font-size: 11px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; }

  .qty-ctrl { display: flex; align-items: center; gap: 8px; }
  .qty-btn {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: transparent;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text);
    transition: all 0.1s;
  }
  .qty-btn:hover { border-color: var(--wine); color: var(--wine); }
  .qty-val { font-size: 14px; font-weight: 500; min-width: 20px; text-align: center; }

  .ci-price { font-size: 14px; font-weight: 500; text-align: right; min-width: 72px; }

  .cart-footer { padding: 16px 20px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 12px; }

  .total-row { display: flex; justify-content: space-between; align-items: baseline; }
  .total-label { font-size: 12px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); }
  .total-val { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 600; color: var(--text); }

  .divider { border: none; border-top: 1px solid var(--border); }

  /* PAYMENT */
  .pay-label { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }

  .pay-opts { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
  .pay-opt {
    padding: 7px 4px;
    font-size: 12px;
    font-family: 'Jost', sans-serif;
    letter-spacing: 0.5px;
    text-align: center;
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    color: var(--text-muted);
    background: var(--cream);
    transition: all 0.15s;
  }
  .pay-opt.selected { background: var(--wine-light); color: var(--wine); border-color: var(--wine-mid); font-weight: 500; }

  .cash-input-wrap { display: flex; align-items: center; gap: 10px; }
  .cash-prefix { font-size: 14px; color: var(--text-muted); }
  .cash-input {
    flex: 1;
    font-family: 'Jost', sans-serif;
    font-size: 16px;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--cream);
    color: var(--text);
    outline: none;
  }
  .cash-input:focus { border-color: var(--wine-mid); }

  .change-box {
    background: var(--wine-light);
    border-radius: 8px;
    padding: 10px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .change-label { font-size: 12px; letter-spacing: 1px; text-transform: uppercase; color: var(--wine); }
  .change-val { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; color: var(--wine); }
  .change-val.negative { color: var(--danger); }

  .btn-checkout {
    width: 100%;
    padding: 13px;
    background: var(--wine);
    color: var(--white);
    border: none;
    border-radius: 10px;
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-checkout:hover { opacity: 0.88; }
  .btn-checkout:disabled { opacity: 0.4; cursor: not-allowed; }

  .empty-cart { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 13px; letter-spacing: 0.5px; }
  .empty-cart .icon { font-size: 32px; margin-bottom: 10px; opacity: 0.4; }

  /* INVENTARIO */
  .inv-section { padding: 24px 20px; max-width: 900px; }

  .add-form {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 24px;
  }

  .form-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 16px;
    color: var(--text);
  }

  .form-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 12px; align-items: end; }
  @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr 1fr; } }

  .field label { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); display: block; margin-bottom: 6px; }
  .field input, .field select {
    width: 100%;
    font-family: 'Jost', sans-serif;
    font-size: 14px;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--cream);
    color: var(--text);
    outline: none;
  }
  .field input:focus, .field select:focus { border-color: var(--wine-mid); }

  .btn-add {
    padding: 9px 20px;
    background: var(--wine);
    color: var(--white);
    border: none;
    border-radius: 8px;
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 1px;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.2s;
    height: 38px;
  }
  .btn-add:hover { opacity: 0.88; }

  .inv-table { width: 100%; border-collapse: collapse; }
  .inv-table th {
    font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--text-muted); font-weight: 400;
    padding: 10px 12px; text-align: left;
    border-bottom: 1px solid var(--border);
    background: var(--cream);
  }
  .inv-table td { padding: 12px; border-bottom: 1px solid var(--cream-dark); font-size: 14px; }
  .inv-table tr:last-child td { border: none; }
  .inv-table tbody tr:hover td { background: var(--cream); }

  .sabor-cell { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 600; }
  .size-badge {
    font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
    padding: 3px 8px; border-radius: 99px;
    background: var(--wine-light); color: var(--wine);
  }

  .btn-del {
    padding: 4px 12px; font-size: 12px;
    border: 1px solid var(--border); border-radius: 6px;
    background: transparent; color: var(--text-muted);
    cursor: pointer; font-family: 'Jost', sans-serif;
    transition: all 0.15s;
  }
  .btn-del:hover { border-color: var(--danger); color: var(--danger); background: #fff0ee; }

  .btn-edit {
    padding: 4px 12px; font-size: 12px;
    border: 1px solid var(--border); border-radius: 6px;
    background: transparent; color: var(--text-muted);
    cursor: pointer; font-family: 'Jost', sans-serif;
    transition: all 0.15s; margin-right: 6px;
  }
  .btn-edit:hover { border-color: var(--wine-mid); color: var(--wine); background: var(--wine-light); }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(42,26,30,0.45);
    z-index: 500; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--white); border-radius: 14px;
    padding: 28px; width: 90%; max-width: 400px;
    box-shadow: 0 8px 40px rgba(42,26,30,0.18);
  }
  .modal-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px; font-weight: 600;
    color: var(--text); margin-bottom: 20px;
  }
  .modal-field { margin-bottom: 14px; }
  .modal-field label {
    font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--text-muted); display: block; margin-bottom: 6px;
  }
  .modal-field input, .modal-field select {
    width: 100%; font-family: 'Jost', sans-serif;
    font-size: 15px; padding: 9px 12px;
    border: 1px solid var(--border); border-radius: 8px;
    background: var(--cream); color: var(--text); outline: none;
  }
  .modal-field input:focus { border-color: var(--wine-mid); }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn-modal-cancel {
    flex: 1; padding: 10px; font-family: 'Jost', sans-serif;
    font-size: 13px; border: 1px solid var(--border);
    border-radius: 8px; background: transparent;
    color: var(--text-muted); cursor: pointer;
  }
  .btn-modal-save {
    flex: 2; padding: 10px; font-family: 'Jost', sans-serif;
    font-size: 13px; font-weight: 500; letter-spacing: 1px;
    border: none; border-radius: 8px;
    background: var(--wine); color: var(--white); cursor: pointer;
  }
  .btn-modal-save:hover { opacity: 0.88; }

  .btn-edit {
    padding: 4px 12px; font-size: 12px;
    border: 1px solid var(--border); border-radius: 6px;
    background: transparent; color: var(--text-muted);
    cursor: pointer; font-family: 'Jost', sans-serif;
    transition: all 0.15s; margin-right: 6px;
  }
  .btn-edit:hover { border-color: var(--wine-mid); color: var(--wine); background: var(--wine-light); }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(42,26,30,0.45);
    z-index: 500; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--white); border-radius: 14px;
    padding: 28px; width: 90%; max-width: 400px;
    box-shadow: 0 8px 40px rgba(42,26,30,0.18);
  }
  .modal-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px; font-weight: 600;
    color: var(--text); margin-bottom: 20px;
  }
  .modal-field { margin-bottom: 14px; }
  .modal-field label {
    font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--text-muted); display: block; margin-bottom: 6px;
  }
  .modal-field input, .modal-field select {
    width: 100%; font-family: 'Jost', sans-serif;
    font-size: 15px; padding: 9px 12px;
    border: 1px solid var(--border); border-radius: 8px;
    background: var(--cream); color: var(--text); outline: none;
  }
  .modal-field input:focus { border-color: var(--wine-mid); }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn-modal-cancel {
    flex: 1; padding: 10px; font-family: 'Jost', sans-serif;
    font-size: 13px; border: 1px solid var(--border);
    border-radius: 8px; background: transparent;
    color: var(--text-muted); cursor: pointer;
  }
  .btn-modal-save {
    flex: 2; padding: 10px; font-family: 'Jost', sans-serif;
    font-size: 13px; font-weight: 500; letter-spacing: 1px;
    border: none; border-radius: 8px;
    background: var(--wine); color: var(--white); cursor: pointer;
  }
  .btn-modal-save:hover { opacity: 0.88; }

  /* HISTORIAL */
  .hist-section { padding: 24px 20px; max-width: 700px; }

  .hist-item {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 10px;
  }
  .hist-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .hist-date { font-size: 12px; color: var(--text-muted); }
  .hist-total { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 600; color: var(--wine); }
  .hist-pay-badge {
    display: inline-block; font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
    padding: 3px 10px; border-radius: 99px;
    background: var(--wine-light); color: var(--wine);
    margin-bottom: 8px;
  }
  .hist-items { font-size: 13px; color: var(--text-muted); }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--text); color: var(--white);
    padding: 10px 20px; border-radius: 99px;
    font-size: 13px; font-weight: 400; letter-spacing: 0.5px;
    transition: transform 0.3s ease;
    z-index: 9999; pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>

  <div style="font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted)">Punto de venta</div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('venta')">Venta</button>
  <button class="tab-btn" onclick="switchTab('inventario')">Inventario</button>
  <button class="tab-btn" onclick="switchTab('historial')">Historial</button>
</div>

<div class="content">

  <!-- VENTA -->
  <div id="tab-venta" class="section visible">
    <div class="venta-layout">
      <div class="prod-panel">
        <p class="panel-title">Selecciona productos</p>
        <div class="size-filter">
          <div class="size-pill active" onclick="filterSize('todos')">Todos</div>
          <div class="size-pill" onclick="filterSize('pequeño')">Pequeño 140gr</div>
          <div class="size-pill" onclick="filterSize('grande')">Grande 240gr</div>
        </div>
        <div class="prod-grid" id="prod-grid"></div>
      </div>

      <div class="cart-panel">
        <div class="cart-header">
          <p class="panel-title" style="margin:0">Carrito</p>
          <button onclick="clearCart()" style="font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);background:none;border:none;cursor:pointer;">Limpiar</button>
        </div>

        <div class="cart-items" id="cart-list">
          <div class="empty-cart">
            <div class="icon">○</div>
            Selecciona productos<br>para comenzar
          </div>
        </div>

        <div class="cart-footer">
          <div class="total-row">
            <span class="total-label">Total</span>
            <span class="total-val" id="total">$0</span>
          </div>

          <hr class="divider">

          <div>
            <p class="pay-label">Forma de pago</p>
            <div class="pay-opts">
              <div class="pay-opt selected" onclick="setPay('Efectivo')">Efectivo</div>
              <div class="pay-opt" onclick="setPay('Tarjeta')">Tarjeta</div>
              <div class="pay-opt" onclick="setPay('Transferencia')">Transf.</div>
            </div>
          </div>

          <div id="cash-section">
            <p class="pay-label">Pago recibido</p>
            <div class="cash-input-wrap">
              <span class="cash-prefix">$</span>
              <input class="cash-input" type="number" id="cash-input" placeholder="0" oninput="calcChange()" min="0">
            </div>
            <div class="change-box" style="margin-top:8px;">
              <span class="change-label">Vueltas</span>
              <span class="change-val" id="change-val">$0</span>
            </div>
          </div>

          <button class="btn-checkout" onclick="checkout()" id="btn-checkout" disabled>Registrar venta</button>
        </div>
      </div>
    </div>
  </div>

  <!-- INVENTARIO -->
  <div id="tab-inventario" class="section">
    <div class="inv-section">
      <div class="add-form">
        <p class="form-title">Agregar producto</p>
        <div class="form-grid">
          <div class="field"><label>Sabor</label><input type="text" id="new-name" placeholder="Ej: Pistachos"></div>
          <div class="field"><label>Tamaño</label>
            <select id="new-size">
              <option value="pequeño">Pequeño 140gr</option>
              <option value="grande">Grande 240gr</option>
            </select>
          </div>
          <div class="field"><label>Precio ($)</label><input type="number" id="new-price" placeholder="0" min="0"></div>
          <div class="field"><label>Stock</label><input type="number" id="new-stock" placeholder="0" min="0"></div>
        </div>
        <button class="btn-add" onclick="addProduct()" style="margin-top:14px;">+ Agregar</button>
      </div>

      <table class="inv-table" id="inv-table">
        <thead>
          <tr>
            <th>Sabor</th>
            <th>Tamaño</th>
            <th>Precio</th>
            <th>Stock</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="inv-body"></tbody>
      </table>
    </div>
  </div>

  <!-- HISTORIAL -->
  <div id="tab-historial" class="section">
    <div class="hist-section">
      <p class="panel-title" style="margin-bottom:16px;">Ventas registradas</p>
      <div id="hist-list"></div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  // ── DATA ──
  let products = [
    { id:1,  name:'Pistachos',           size:'pequeño', price:32000, stock:10 },
    { id:2,  name:'Pistachos',           size:'grande',  price:63000, stock:10 },
    { id:3,  name:'Maní',                size:'pequeño', price:14000, stock:20 },
    { id:4,  name:'Maní',                size:'grande',  price:22000, stock:20 },
    { id:5,  name:'Almendras',           size:'pequeño', price:19000, stock:15 },
    { id:6,  name:'Almendras',           size:'grande',  price:30000, stock:15 },
    { id:7,  name:'Marañón',             size:'pequeño', price:23000, stock:12 },
    { id:8,  name:'Marañón',             size:'grande',  price:39000, stock:12 },
    { id:9,  name:'Marañón con avellanas',size:'pequeño',price:24000, stock:10 },
    { id:10, name:'Marañón con avellanas',size:'grande', price:39000, stock:10 },
    { id:11, name:'Macadamia',           size:'pequeño', price:23000, stock:8  },
    { id:12, name:'Choco-maní',          size:'pequeño', price:17000, stock:15 },
    { id:13, name:'Choco-maní',          size:'grande',  price:24000, stock:15 },
    { id:14, name:'Maní con banano',     size:'pequeño', price:18000, stock:12 },
    { id:15, name:'Maní con banano',     size:'grande',  price:25000, stock:12 },
    { id:16, name:'Maní con arándanos',  size:'pequeño', price:16000, stock:10 },
  ];

  let cart = {};
  let payMethod = 'Efectivo';
  let sales = [];
  let nextId = 17;
  let sizeFilter = 'todos';

  // Load from localStorage
  try {
    const saved = localStorage.getItem('nusse_data');
    if (saved) {
      const d = JSON.parse(saved);
      if (d.products) products = d.products;
      if (d.sales) sales = d.sales;
      if (d.nextId) nextId = d.nextId;
    }
  } catch(e) {}

  function save() {
    try { localStorage.setItem('nusse_data', JSON.stringify({ products, sales, nextId })); } catch(e) {}
  }

  // ── FORMAT ──
  function fmt(n) { return '$' + Math.round(n).toLocaleString('es-CO'); }

  function fmtDate(d) {
    return new Date(d).toLocaleString('es-CO', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
  }

  // ── TOAST ──
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2200);
  }

  // ── TABS ──
  function switchTab(t) {
    document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', ['venta','inventario','historial'][i]===t));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('visible'));
    document.getElementById('tab-'+t).classList.add('visible');
    if (t==='inventario') renderInvTable();
    if (t==='historial') renderHistory();
  }

  // ── PRODUCTS ──
  function filterSize(s) {
    sizeFilter = s;
    document.querySelectorAll('.size-pill').forEach((el,i) => el.classList.toggle('active', ['todos','pequeño','grande'][i]===s));
    renderProducts();
  }

  function renderProducts() {
    const filtered = sizeFilter === 'todos' ? products : products.filter(p => p.size === sizeFilter);
    document.getElementById('prod-grid').innerHTML = filtered.map(p => `
      <div class="prod-card ${p.stock===0?'disabled':''}" onclick="addToCart(${p.id})">
        <div class="prod-sabor">${p.name}</div>
        <div class="prod-size">${p.size === 'pequeño' ? '140gr' : '240gr'}</div>
        <div class="prod-price">${fmt(p.price)}</div>
        <div class="prod-stock">${p.stock === 0 ? 'Sin stock' : 'Stock: '+p.stock}</div>
      </div>`).join('');
  }

  // ── CART ──
  function addToCart(id) {
    const p = products.find(x => x.id===id);
    if (!p || p.stock===0) return;
    if (!cart[id]) cart[id] = 0;
    if (cart[id] >= p.stock) { toast('Stock máximo alcanzado'); return; }
    cart[id]++;
    renderCart();
  }

  function changeQty(id, delta) {
    cart[id] = (cart[id]||0) + delta;
    if (cart[id] <= 0) delete cart[id];
    renderCart();
  }

  function clearCart() {
    cart = {};
    document.getElementById('cash-input').value = '';
    renderCart();
  }

  function renderCart() {
    const keys = Object.keys(cart);
    const list = document.getElementById('cart-list');
    if (!keys.length) {
      list.innerHTML = `<div class="empty-cart"><div class="icon">○</div>Selecciona productos<br>para comenzar</div>`;
      updateTotals();
      return;
    }
    list.innerHTML = keys.map(id => {
      const p = products.find(x => x.id==id);
      return `<div class="cart-item">
        <div class="ci-info">
          <div class="ci-name">${p.name}</div>
          <div class="ci-size">${p.size === 'pequeño' ? '140gr' : '240gr'}</div>
        </div>
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="changeQty(${id},-1)">−</button>
          <span class="qty-val">${cart[id]}</span>
          <button class="qty-btn" onclick="changeQty(${id},1)">+</button>
        </div>
        <div class="ci-price">${fmt(p.price * cart[id])}</div>
      </div>`;
    }).join('');
    updateTotals();
    renderProducts();
  }

  function getTotal() {
    return Object.keys(cart).reduce((s,id) => {
      const p = products.find(x => x.id==id);
      return s + (p ? p.price * cart[id] : 0);
    }, 0);
  }

  function updateTotals() {
    const t = getTotal();
    document.getElementById('total').textContent = fmt(t);
    document.getElementById('btn-checkout').disabled = t === 0;
    calcChange();
  }

  // ── PAYMENT ──
  function setPay(m) {
    payMethod = m;
    document.querySelectorAll('.pay-opt').forEach(el => el.classList.toggle('selected', el.textContent.trim()===m || (m==='Transferencia' && el.textContent.includes('Transf'))));
    document.getElementById('cash-section').style.display = m==='Efectivo' ? 'block' : 'none';
  }

  function calcChange() {
    const received = parseFloat(document.getElementById('cash-input').value)||0;
    const total = getTotal();
    const change = received - total;
    const el = document.getElementById('change-val');
    el.textContent = fmt(Math.max(0, change));
    el.className = 'change-val' + (change < 0 ? ' negative' : '');
  }

  // ── CHECKOUT ──
  function checkout() {
    const total = getTotal();
    if (!Object.keys(cart).length) return;
    if (payMethod==='Efectivo') {
      const received = parseFloat(document.getElementById('cash-input').value)||0;
      if (received < total) { toast('El pago es menor al total'); return; }
    }
    const items = Object.keys(cart).map(id => {
      const p = products.find(x => x.id==id);
      p.stock -= cart[id];
      return { name: p.name, size: p.size, qty: cart[id], price: p.price };
    });
    sales.unshift({ date: new Date().toISOString(), items, total, pay: payMethod });
    save();
    cart = {};
    document.getElementById('cash-input').value = '';
    renderCart();
    renderProducts();
    toast('Venta registrada ✓');
  }

  // ── INVENTARIO ──
  function addProduct() {
    const name = document.getElementById('new-name').value.trim();
    const size = document.getElementById('new-size').value;
    const price = parseFloat(document.getElementById('new-price').value);
    const stock = parseInt(document.getElementById('new-stock').value);
    if (!name || isNaN(price) || isNaN(stock)) { toast('Completa todos los campos'); return; }
    products.push({ id: nextId++, name, size, price, stock });
    save();
    document.getElementById('new-name').value = '';
    document.getElementById('new-price').value = '';
    document.getElementById('new-stock').value = '';
    renderInvTable();
    renderProducts();
    toast('Producto agregado ✓');
  }

  function deleteProduct(id) {
    if (!confirm('¿Eliminar este producto?')) return;
    products = products.filter(p => p.id!==id);
    delete cart[id];
    save();
    renderInvTable();
    renderProducts();
    renderCart();
  }

  function renderInvTable() {
    document.getElementById('inv-body').innerHTML = products.map(p => `
      <tr>
        <td class="sabor-cell">${p.name}</td>
        <td><span class="size-badge">${p.size === 'pequeño' ? '140gr' : '240gr'}</span></td>
        <td>${fmt(p.price)}</td>
        <td>${p.stock}</td>
        <td>
          <button class="btn-edit" onclick="openEdit(${p.id})">Editar</button>
          <button class="btn-del" onclick="deleteProduct(${p.id})">Eliminar</button>
        </td>
      </tr>`).join('');
  }


  // ── EDIT MODAL ──
  let editingId = null;

  function openEdit(id) {
    const p = products.find(x => x.id === id);
    if (!p) return;
    editingId = id;
    document.getElementById('edit-name').value = p.name;
    document.getElementById('edit-size').value = p.size;
    document.getElementById('edit-price').value = p.price;
    document.getElementById('edit-stock').value = p.stock;
    document.getElementById('edit-modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('edit-modal').classList.remove('open');
    editingId = null;
  }

  function saveEdit() {
    const p = products.find(x => x.id === editingId);
    if (!p) return;
    const name = document.getElementById('edit-name').value.trim();
    const size = document.getElementById('edit-size').value;
    const price = parseFloat(document.getElementById('edit-price').value);
    const stock = parseInt(document.getElementById('edit-stock').value);
    if (!name || isNaN(price) || isNaN(stock)) { toast('Completa todos los campos'); return; }
    p.name = name; p.size = size; p.price = price; p.stock = stock;
    save();
    closeModal();
    renderInvTable();
    renderProducts();
    toast('Producto actualizado ✓');
  }

  // ── HISTORIAL ──
  function renderHistory() {
    const el = document.getElementById('hist-list');
    if (!sales.length) {
      el.innerHTML = `<p style="color:var(--text-muted);font-size:13px;text-align:center;padding:40px 0;">Aún no hay ventas registradas</p>`;
      return;
    }
    el.innerHTML = sales.map(s => `
      <div class="hist-item">
        <div class="hist-top">
          <span class="hist-date">${fmtDate(s.date)}</span>
          <span class="hist-total">${fmt(s.total)}</span>
        </div>
        <span class="hist-pay-badge">${s.pay}</span>
        <div class="hist-items">${s.items.map(i => `${i.qty}× ${i.name} (${i.size==='pequeño'?'140gr':'240gr'})`).join(' · ')}</div>
      </div>`).join('');
  }

  // ── INIT ──
  renderProducts();
  renderCart();
</script>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <p class="modal-title">Editar producto</p>
    <div class="modal-field">
      <label>Sabor</label>
      <input type="text" id="edit-name" placeholder="Nombre del producto">
    </div>
    <div class="modal-field">
      <label>Tamaño</label>
      <select id="edit-size">
        <option value="pequeño">Pequeño 140gr</option>
        <option value="grande">Grande 240gr</option>
      </select>
    </div>
    <div class="modal-field">
      <label>Precio ($)</label>
      <input type="number" id="edit-price" placeholder="0" min="0">
    </div>
    <div class="modal-field">
      <label>Stock (unidades)</label>
      <input type="number" id="edit-stock" placeholder="0" min="0">
    </div>
    <div class="modal-actions">
      <button class="btn-modal-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-modal-save" onclick="saveEdit()">Guardar cambios</button>
    </div>
  </div>
</div>
</body>
</html>
